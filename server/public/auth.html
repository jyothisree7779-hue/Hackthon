<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - MEDISPHERE</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body style="display: flex; align-items: center; justify-content: center; background: #eef2f7;">
    <div class="container animate-fade" style="max-width: 450px;">
        <div class="glass-card">
            <h2 id="authTitle" style="text-align: center; margin-bottom: 2rem;">Access MEDISPHERE</h2>

            <div id="roleSelector" style="margin-bottom: 1.5rem;">
                <label>Select Your Role</label>
                <select id="role" class="form-input">
                    <option value="patient">Patient</option>
                    <option value="health_worker">Health Worker</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <form id="authForm">
                <div id="registerFields" style="display: none;">
                    <div class="form-group">
                        <input type="text" id="name" placeholder="Full Name">
                    </div>
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                <span id="toggleText">Don't have an account?</span>
                <a href="#" id="toggleAuth" style="color: var(--primary); font-weight: 600;">Register</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let isLogin = true;
        const authForm = document.getElementById('authForm');
        const registerFields = document.getElementById('registerFields');
        const authTitle = document.getElementById('authTitle');
        const toggleAuth = document.getElementById('toggleAuth');
        const toggleText = document.getElementById('toggleText');

        toggleAuth.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            registerFields.style.display = isLogin ? 'none' : 'block';
            authTitle.innerText = isLogin ? 'Access MEDISPHERE' : 'Join MEDISPHERE';
            authForm.querySelector('button').innerText = isLogin ? 'Login' : 'Register';
            toggleText.innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleAuth.innerText = isLogin ? 'Register' : 'Login';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            if (isLogin) {
                await app.login(email, password);
            } else {
                const name = document.getElementById('name').value;
                await app.register({ name, email, password, role });
            }
        });
    </script>
</body>

</html>
